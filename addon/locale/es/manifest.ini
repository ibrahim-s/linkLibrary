name = linkLibrary
summary = "Link Library"
description = """Este complemento ayuda al usuario a organizar sus enlaces o marcadores al estilo de una biblioteca.
Desde el diálogo principal de bibliotecas, puedes elegir la biblioteca o categoría que prefieras y pulsar intro sobre ella.
En el diálogo que se abre, tendrás todos los enlaces de esa categoría en una lista y tendrás acceso a la URL de origen y a la información "acerca de" de cada enlace, si estuviera presente.
Este complemento no incluye un gesto o atajo de teclado asignado de forma predeterminada.
Como siempre, puedes añadir un gesto o cambiar el existente yendo a:
Menú NVDA > Preferencias > Gestos de entrada > Link Library."""
author = "ibrahim hamadeh<ibra.hamadeh@hotmail.com>"
url = https://github.com/ibrahim-s/linkLibrary
version = 2.2.6
changelog = """- Se actualizó la última versión probada para cumplir con el reciente lanzamiento de NVDA 2026.1.
- En el diálogo de configuración del complemento, dentro del cuadro combinado que contiene varias rutas para almacenar datos del complemento, ahora se muestra la ruta del directorio completo y no solo la etiqueta de la ruta.
"""
docFileName = readme.html
